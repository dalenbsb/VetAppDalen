name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Definir projeto
        run: gcloud config set project vetappdalen

      # BUILD COM VERSIONAMENTO
      - name: Build da imagem
        run: |
          IMAGE=gcr.io/vetappdalen/vetapp
          TAG=${{ github.sha }}

          echo "Building image: $IMAGE:$TAG"

          gcloud builds submit . --tag $IMAGE:$TAG

          # Criar tag latest apontando para o mesmo build
          gcloud container images add-tag \
            $IMAGE:$TAG \
            $IMAGE:latest \
            --quiet

      # DEPLOY COM SHA (imutável)
      - name: Deploy no Cloud Run
        run: >
          gcloud run deploy vetapp
          --image gcr.io/vetappdalen/vetapp:${{ github.sha }}
          --platform managed
          --region southamerica-east1
          --allow-unauthenticated